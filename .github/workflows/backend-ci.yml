name: Backend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'shared/**'
      - 'apps/api-gateway/**'
      - 'apps/auth-service/**'
      - 'apps/core-service/**'
      - 'apps/search-service/**'
      - 'apps/notification-service/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'shared/**'
      - 'apps/api-gateway/**'
      - 'apps/auth-service/**'
      - 'apps/core-service/**'
      - 'apps/search-service/**'
      - 'apps/notification-service/**'
      - '.github/workflows/backend-ci.yml'

env:
  DOTNET_VERSION: '8.0.x'
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - name: BuildingBlocks
            path: shared/building-blocks
            csproj: DeskMatch.BuildingBlocks.csproj
          - name: Domain
            path: shared/domain
            csproj: DeskMatch.Domain.csproj
          - name: SDK.OpenSearch
            path: shared/sdk/src/OpenSearch
            csproj: DeskMatch.SDK.OpenSearch.csproj
          - name: SDK.Redis
            path: shared/sdk/src/Redis
            csproj: DeskMatch.SDK.Redis.csproj
          - name: SDK.Notification
            path: shared/sdk/src/Notification
            csproj: DeskMatch.SDK.Notification.csproj
          - name: SDK.Storage
            path: shared/sdk/src/Storage
            csproj: DeskMatch.SDK.Storage.csproj
          - name: ApiGateway
            path: apps/api-gateway
            csproj: ApiGateway.csproj
          - name: AuthService
            path: apps/auth-service
            csproj: AuthService.csproj
          - name: CoreService
            path: apps/core-service
            csproj: CoreService.csproj
          - name: SearchService
            path: apps/search-service
            csproj: SearchService.csproj
          - name: NotificationService
            path: apps/notification-service
            csproj: NotificationService.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore "${{ matrix.project.path }}/${{ matrix.project.csproj }}"

      - name: Build
        run: dotnet build "${{ matrix.project.path }}/${{ matrix.project.csproj }}" --configuration Release --no-restore

      - name: Test
        run: dotnet test "${{ matrix.project.path }}/${{ matrix.project.csproj }}" --configuration Release --no-build --verbosity normal || echo "No tests found for ${{ matrix.project.name }}"

  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - core-service
          - search-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max