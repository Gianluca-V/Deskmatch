name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        default: 'development'
        options:
          - development
          - staging
          - production
      image_tag:
        description: 'Docker image tag (defaults to latest on main)'
        required: false
        type: string
        default: 'latest'
      deploy_with_helm:
        description: 'Deploy using Helm instead of kustomize'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  KUBERNETES_NAMESPACE: deskmatch
  KUSTOMIZE_DIR: infrastructure/kubernetes/${{ github.event.inputs.environment }}
  HELM_CHART_DIR: infrastructure/helm/deskmatch

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
      url: ${{ steps.deploy-info.outputs.environment_url }}

    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment URL
        id: deploy-info
        run: |
          case "${{ github.event.inputs.environment }}" in
            development) echo "environment_url=https://dev.deskmatch.local" >> "$GITHUB_OUTPUT" ;;
            staging)     echo "environment_url=https://staging.deskmatch.local" >> "$GITHUB_OUTPUT" ;;
            production)  echo "environment_url=https://deskmatch.local" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Set image tag suffix
        id: image-tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ "$TAG" = "latest" ]; then
            TAG="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Set up Kustomize
        if: ${{ github.event.inputs.deploy_with_helm == 'false' }}
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.x'

      - name: Set up Helm
        if: ${{ github.event.inputs.deploy_with_helm == 'true' }}
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Authenticate to Kubernetes
        uses: azure/k8s-set-context@v4
        with:
          method: service-account
          k8s-url: ${{ secrets.KUBERNETES_URL }}
          k8s-secret: ${{ secrets.KUBERNETES_SECRET }}

      - name: Deploy via Kustomize
        if: ${{ github.event.inputs.deploy_with_helm == 'false' }}
        run: |
          cd ${{ env.KUSTOMIZE_DIR }}
          kustomize edit set image \
            api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/api-gateway:${{ steps.image-tag.outputs.tag }} \
            auth-service=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/auth-service:${{ steps.image-tag.outputs.tag }} \
            core-service=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/core-service:${{ steps.image-tag.outputs.tag }} \
            search-service=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/search-service:${{ steps.image-tag.outputs.tag }} \
            notification-service=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/notification-service:${{ steps.image-tag.outputs.tag }} \
            frontend-web=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/frontend-web:${{ steps.image-tag.outputs.tag }} \
            frontend-admin=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/frontend-admin:${{ steps.image-tag.outputs.tag }}
          kustomize build . | kubectl apply -f -

      - name: Deploy via Helm
        if: ${{ github.event.inputs.deploy_with_helm == 'true' }}
        run: |
          helm upgrade --install deskmatch ${{ env.HELM_CHART_DIR }} \
            --namespace ${{ env.KUBERNETES_NAMESPACE }} \
            --create-namespace \
            --values ${{ env.HELM_CHART_DIR }}/values-${{ github.event.inputs.environment }}.yaml \
            --set image.tag=${{ steps.image-tag.outputs.tag }} \
            --set image.registry=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }} \
            --wait \
            --timeout 10m

  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Authenticate to Kubernetes
        uses: azure/k8s-set-context@v4
        with:
          method: service-account
          k8s-url: ${{ secrets.KUBERNETES_URL }}
          k8s-secret: ${{ secrets.KUBERNETES_SECRET }}

      - name: Wait for deployments
        run: |
          deployments=(
            api-gateway
            auth-service
            core-service
            search-service
            notification-service
            frontend-web
            frontend-admin
          )

          for deploy in "${deployments[@]}"; do
            echo "Waiting for deployment/$deploy..."
            kubectl rollout status deployment/$deploy \
              --namespace ${{ env.KUBERNETES_NAMESPACE }} \
              --timeout=5m
          done

      - name: Verify pod health
        run: |
          kubectl wait --for=condition=Ready pods \
            --all \
            --namespace ${{ env.KUBERNETES_NAMESPACE }} \
            --timeout=5m || true

          kubectl get pods --namespace ${{ env.KUBERNETES_NAMESPACE }}

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image Tag:** ${{ steps.image-tag.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Method:** ${{ github.event.inputs.deploy_with_helm == 'true' && 'Helm' || 'Kustomize' }}" >> "$GITHUB_STEP_SUMMARY"