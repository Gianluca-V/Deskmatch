apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: deskmatch

resources:
  - ../base

patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits
        value:
          memory: "512Mi"
          cpu: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests
        value:
          memory: "256Mi"
          cpu: "500m"
      - op: add
        path: /spec/strategy
        value:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
  - target:
      kind: Deployment
      name: auth-service
    patch: |-
      - op: replace
