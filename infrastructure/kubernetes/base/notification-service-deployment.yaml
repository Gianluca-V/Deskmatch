apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: deskmatch
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: deskmatch/notification-service:latest
          ports:
            - containerPort: 5004
          envFrom:
            - configMapRef:
                name: deskmatch-config
            - secretRef:
                name: deskmatch-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 30
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: deskmatch
  labels:
    app: notification-service
spec:
  type: ClusterIP
  ports:
    - port: 5004
      targetPort: 5004
      protocol: TCP
  selector:
    app: notification-service