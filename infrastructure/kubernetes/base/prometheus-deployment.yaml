apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: deskmatch
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "api-gateway"
        static_configs:
          - targets: ["api-gateway.deskmatch.svc.cluster.local:5000"]
        metrics_path: /metrics

      - job_name: "auth-service"
        static_configs:
          - targets: ["auth-service.deskmatch.svc.cluster.local:5001"]
        metrics_path: /metrics

      - job_name: "core-service"
        static_configs:
          - targets: ["core-service.deskmatch.svc.cluster.local:5002"]
        metrics_path: /metrics

      - job_name: "search-service"
        static_configs:
          - targets: ["search-service.deskmatch.svc.cluster.local:5003"]
        metrics_path: /metrics

      - job_name: "notification-service"
        static_configs:
          - targets: ["notification-service.deskmatch.svc.cluster.local:5004"]
        metrics_path: /metrics

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: deskmatch
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.50.0
          ports:
            - containerPort: 9090
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-storage
              mountPath: /prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-storage
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: deskmatch
  labels:
    app: prometheus
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: prometheus