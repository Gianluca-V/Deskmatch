apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: deskmatch

resources:
  - ../base

patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests
        value:
          memory: "64Mi"
          cpu: "50m"
  - target:
      kind: Deployment
      name: auth-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests
        value:
          memory: "64Mi"
          cpu: "50m"
  - target:
      kind: Deployment
      name: core-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests
        value:
          memory: "64Mi"
          cpu: "50m"
  - target:
      kind: Deployment
      name: search-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests
        value:
          memory: "64Mi"
          cpu: "50m"
  - target:
      kind: Deployment
      name: notification-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests
        value:
          memory: "64Mi"
          cpu: "50m"
  - target:
      kind: Deployment
      name: frontend-web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests
        value:
          memory: "32Mi"
          cpu: "25m"
  - target:
      kind: Deployment
      name: frontend-admin
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests
        value:
          memory: "32Mi"
          cpu: "25m"
  - target:
      kind: Deployment
      name: postgres
    patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits
  - target:
      kind: Deployment
      name: redis
    patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits
  - target:
      kind: Deployment
      name: opensearch
    patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits
  - target:
      kind: ConfigMap
      name: deskmatch-config
    patch: |-
      - op: replace
        path: /data/ASPNETCORE_ENVIRONMENT
        value: "Development"
      - op: replace
        path: /data/SERILOG_MINIMUM_LEVEL
        value: "Debug"