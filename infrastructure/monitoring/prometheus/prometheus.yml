global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-gateway:5000']

  - job_name: 'auth-service'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['auth-service:5001']

  - job_name: 'core-service'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['core-service:5002']

  - job_name: 'search-service'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['search-service:5004']

  - job_name: 'notification-service'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['notification-service:5005']

  - job_name: 'opensearch'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['opensearch:9200']

  - job_name: 'redis'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'postgres'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['postgres-exporter:9187']

rule_files:
  - 'rules/deskmatch-alerts.yml'
