version: "3.9"

networks:
  deskmatch-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  opensearch-data:
  prometheus-data:
  grafana-data:
  loki-data:
  minio-data:

services:
  # ────────────────────────────────────────────── INFRASTRUCTURE ──
  postgres:
    image: postgres:16-alpine
    container_name: deskmatch-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deskmatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deskmatch123!}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES:-deskmatch_auth,deskmatch_core,deskmatch_notification}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
      - ./postgres/init-auth.sql:/docker-entrypoint-initdb.d/init-auth.sql
      - ./postgres/init-core.sql:/docker-entrypoint-initdb.d/init-core.sql
      - ./postgres/init-notification.sql:/docker-entrypoint-initdb.d/init-notification.sql
    networks:
      - deskmatch-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deskmatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deskmatch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - deskmatch-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: deskmatch-opensearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-DeskMatch123!}
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - deskmatch-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -k -u admin:DeskMatch123\\! http://localhost:9200/_cluster/health | grep -q -E '(green|yellow)'",
        ]
      interval: 15s
      timeout: 10s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: deskmatch-opensearch-dashboards
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: http://opensearch:9200
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - deskmatch-network

  opensearch-init:
    image: alpine/curl:latest
    container_name: deskmatch-opensearch-init
    depends_on:
      opensearch:
        condition: service_healthy
    volumes:
      - ./opensearch/offices-mapping.json:/init/offices-mapping.json
      - ./opensearch/seed-data.json:/init/seed-data.json
      - ./opensearch/init-index.sh:/init/init-index.sh
    environment:
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-DeskMatch123!}
    entrypoint:
      ["/bin/sh", "-c", "chmod +x /init/init-index.sh && /init/init-index.sh"]
    networks:
      - deskmatch-network

  # ────────────────────────────────────────────── MONITORING ──
  prometheus:
    image: prom/prometheus:latest
    container_name: deskmatch-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - deskmatch-network

  grafana:
    image: grafana/grafana:latest
    container_name: deskmatch-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
      - loki
    networks:
      - deskmatch-network

  loki:
    image: grafana/loki:latest
    container_name: deskmatch-loki
    user: root
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/tmp/loki
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - deskmatch-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────── OBJECT STORAGE ──
  minio:
    image: minio/minio:latest
    container_name: deskmatch-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_DOMAIN: minio
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - deskmatch-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    container_name: deskmatch-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-deskmatch}
      MINIO_ENDPOINT: http://minio:9000
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD
        mc mb myminio/$$MINIO_BUCKET --ignore-existing
        mc anonymous set download myminio/$$MINIO_BUCKET
        echo "MinIO bucket '$$MINIO_BUCKET' ready with anonymous read"
    networks:
      - deskmatch-network

  # ────────────────────────────────────────────── APPLICATION SERVICES ──
  auth-service:
    build:
      context: ../../.
      dockerfile: apps/auth-service/Dockerfile
    container_name: deskmatch-auth-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=deskmatch_auth;Username=${POSTGRES_USER:-deskmatch};Password=${POSTGRES_PASSWORD:-deskmatch123!}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__AccessTokenExpirationMinutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}
      Jwt__RefreshTokenExpirationDays: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-7}
      Redis__ConnectionString: redis:6379,password=,ssl=false,abortConnect=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - deskmatch-network

  core-service:
    build:
      context: ../../.
      dockerfile: apps/core-service/Dockerfile
    container_name: deskmatch-core-service
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5002
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=deskmatch_core;Username=${POSTGRES_USER:-deskmatch};Password=${POSTGRES_PASSWORD:-deskmatch123!}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      OpenSearch__Uri: http://opensearch:9200
      OpenSearch__User: admin
      OpenSearch__Password: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-DeskMatch123!}
      Redis__ConnectionString: redis:6379,password=,ssl=false,abortConnect=false
      Storage__Provider: ${STORAGE_PROVIDER:-minio}
      Storage__Endpoint: ${STORAGE_ENDPOINT:-minio:9000}
      Storage__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      Storage__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin}
      Storage__BucketName: ${MINIO_BUCKET:-deskmatch}
      Storage__UseSsl: ${STORAGE_USE_SSL:-false}
      Storage__PublicUrl: ${STORAGE_PUBLIC_URL:-http://localhost:9000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    networks:
      - deskmatch-network

  search-service:
    build:
      context: ../../.
      dockerfile: apps/search-service/Dockerfile
    container_name: deskmatch-search-service
    restart: unless-stopped
    ports:
      - "5004:5004"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5004
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=deskmatch_core;Username=${POSTGRES_USER:-deskmatch};Password=${POSTGRES_PASSWORD:-deskmatch123!}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      OpenSearch__Uri: http://opensearch:9200
      OpenSearch__User: admin
      OpenSearch__Password: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-DeskMatch123!}
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - deskmatch-network

  notification-service:
    build:
      context: ../../.
      dockerfile: apps/notification-service/Dockerfile
    container_name: deskmatch-notification-service
    restart: unless-stopped
    ports:
      - "5005:5005"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5005
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=deskmatch_notification;Username=${POSTGRES_USER:-deskmatch};Password=${POSTGRES_PASSWORD:-deskmatch123!}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Notification__Provider: ${NOTIFICATION_PROVIDER:-smtp}
      Smtp__Host: ${SMTP_HOST:-mailhog}
      Smtp__Port: ${SMTP_PORT:-1025}
      Smtp__User: ${SMTP_USER:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromEmail: ${SMTP_FROM_EMAIL:-noreply@deskmatch.com}
      Smtp__FromName: ${SMTP_FROM_NAME:-DeskMatch}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - deskmatch-network

  # ────────────────────────────────────────────── CLOUDFLARE TUNNEL ──
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: deskmatch-cloudflared
    restart: unless-stopped
    command: tunnel run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    secrets:
      - tunnel-credentials
    depends_on:
      frontend-web:
        condition: service_started
    networks:
      - deskmatch-network


  api-gateway:
    build:
      context: ../../.
      dockerfile: apps/api-gateway/Dockerfile
    container_name: deskmatch-api-gateway
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=deskmatch_auth;Username=${POSTGRES_USER:-deskmatch};Password=${POSTGRES_PASSWORD:-deskmatch123!}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Auth__Authority: http://auth-service:5001
      Auth__Audience: DeskMatch
      CORS_ALLOWED_ORIGINS: http://localhost:3001,http://localhost:3002,http://localhost:5173,http://localhost:5174,https://deskmatch.vespelabs.com,http://192.168.1.58:3001,http://192.168.1.58:3002
    depends_on:
      - auth-service
      - core-service
      - search-service
      - notification-service
    networks:
      - deskmatch-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────── FRONTENDS ──
  frontend-web:
    build:
      context: ../../apps/frontend-web
      dockerfile: Dockerfile
    container_name: deskmatch-frontend-web
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - deskmatch-network

  frontend-admin:
    build:
      context: ../../apps/frontend-admin
      dockerfile: Dockerfile
    container_name: deskmatch-frontend-admin
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - deskmatch-network


secrets:
  tunnel-credentials:
    file: ./.cloudflared/credentials.json
