global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api-gateway:5000"]

  - job_name: "auth-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["auth-service:5001"]

  - job_name: "core-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["core-service:5002"]

  - job_name: "search-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["search-service:5004"]

  - job_name: "notification-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["notification-service:5005"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "opensearch"
    metrics_path: "/_prometheus/metrics"
    static_configs:
      - targets: ["opensearch:9200"]