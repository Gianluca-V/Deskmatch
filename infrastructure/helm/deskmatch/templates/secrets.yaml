apiVersion: v1
kind: Secret
metadata:
  name: {{ include "deskmatch.fullname" . }}-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "deskmatch.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgres.password | b64enc | quote }}
  JWT_SECRET: {{ .Values.secrets.jwt.secret | b64enc | quote }}
  OPENSEARCH_PASSWORD: {{ .Values.secrets.opensearch.password | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redis.password | b64enc | quote }}
  RABBITMQ_PASSWORD: {{ .Values.secrets.rabbitmq.password | b64enc | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtp.password | b64enc | quote }}
  SMTP_USER: {{ .Values.secrets.smtp.user | b64enc | quote }}
  STORAGE_ACCESS_KEY: {{ .Values.secrets.storage.accessKey | b64enc | quote }}
  STORAGE_SECRET_KEY: {{ .Values.secrets.storage.secretKey | b64enc | quote }}
  SENDGRID_API_KEY: {{ .Values.secrets.sendgrid.apiKey | b64enc | quote }}