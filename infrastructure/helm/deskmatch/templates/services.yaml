{{/* Backend Services */}}
{{- range $name, $svc := .Values.backendServices }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    {{- include "deskmatch.serviceLabels" (merge (dict "component" $name) $) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
      protocol: TCP
  selector:
    {{- include "deskmatch.serviceSelectorLabels" (merge (dict "component" $name) $) | nindent 4 }}
---
{{- end }}

{{/* Frontend Services */}}
{{- range $name, $fe := .Values.frontends }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    {{- include "deskmatch.serviceLabels" (merge (dict "component" $name) $) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $fe.port }}
      targetPort: {{ $fe.port }}
      protocol: TCP
  selector:
    {{- include "deskmatch.serviceSelectorLabels" (merge (dict "component" $name) $) | nindent 4 }}
---
{{- end }}

{{/* Infrastructure Services */}}
{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "deskmatch.serviceLabels" (merge (dict "component" "postgres") .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    {{- include "deskmatch.serviceSelectorLabels" (merge (dict "component" "postgres") .) | nindent 4 }}
---
{{- end }}

{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
