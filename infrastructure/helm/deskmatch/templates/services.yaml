{{- if .Values.opensearch.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "deskmatch.serviceLabels" (merge (dict "component" "opensearch") .) | nindent 4 }}
spec:
  type: ClusterIP
