apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "deskmatch.fullname" . }}-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "deskmatch.labels" . | nindent 4 }}
data:
  ASPNETCORE_ENVIRONMENT: {{ .Values.config.aspnet.environment | quote }}
  ASPNETCORE_URLS: "http://+:5000"

  POSTGRES_HOST: {{ .Values.config.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.config.postgres.port | quote }}
  POSTGRES_DATABASE: {{ .Values.config.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.config.postgres.user | quote }}

  REDIS_HOST: {{ .Values.config.redis.host | quote }}
  REDIS_PORT: {{ .Values.config.redis.port | quote }}

  OPENSEARCH_HOST: {{ .Values.config.opensearch.host | quote }}
  OPENSEARCH_PORT: {{ .Values.config.opensearch.port | quote }}
  OPENSEARCH_URI: {{ .Values.config.opensearch.uri | quote }}
  OPENSEARCH_USER: {{ .Values.config.opensearch.user | quote }}

  RABBITMQ_HOST: {{ .Values.config.rabbitmq.host | quote }}
  RABBITMQ_PORT: {{ .Values.config.rabbitmq.port | quote }}
  RABBITMQ_USER: {{ .Values.config.rabbitmq.user | quote }}
  RABBITMQ_VIRTUAL_HOST: {{ .Values.config.rabbitmq.virtualHost | quote }}

  API_GATEWAY_URL: "http://api-gateway.{{ .Values.namespace.name }}.svc.cluster.local:5000"
  AUTH_SERVICE_URL: "http://auth-service.{{ .Values.namespace.name }}.svc.cluster.local:5001"
  CORE_SERVICE_URL: "http://core-service.{{ .Values.namespace.name }}.svc.cluster.local:5002"
  SEARCH_SERVICE_URL: "http://search-service.{{ .Values.namespace.name }}.svc.cluster.local:5003"
  NOTIFICATION_SERVICE_URL: "http://notification-service.{{ .Values.namespace.name }}.svc.cluster.local:5004"

  API_GATEWAY_PORT: "5000"
  AUTH_SERVICE_PORT: "5001"
  CORE_SERVICE_PORT: "5002"
  SEARCH_SERVICE_PORT: "5003"
  NOTIFICATION_SERVICE_PORT: "5004"

  CORS_ALLOWED_ORIGINS: {{ .Values.config.cors.allowedOrigins | quote }}

  SERILOG_MINIMUM_LEVEL: {{ .Values.config.serilog.minimumLevel | quote }}

  NOTIFICATION_PROVIDER: {{ .Values.config.notification.provider | quote }}
  SMTP_FROM_EMAIL: {{ .Values.config.notification.smtpFromEmail | quote }}
  SMTP_FROM_NAME: {{ .Values.config.notification.smtpFromName | quote }}

  STORAGE_PROVIDER: {{ .Values.config.storage.provider | quote }}
  STORAGE_ENDPOINT: {{ .Values.config.storage.endpoint | quote }}
  STORAGE_BUCKET_NAME: {{ .Values.config.storage.bucketName | quote }}

  JWT_ISSUER: {{ .Values.config.jwt.issuer | quote }}
  JWT_AUDIENCE: {{ .Values.config.jwt.audience | quote }}
  JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: {{ .Values.config.jwt.accessTokenExpirationMinutes | quote }}
  JWT_REFRESH_TOKEN_EXPIRATION_DAYS: {{ .Values.config.jwt.refreshTokenExpirationDays | quote }}