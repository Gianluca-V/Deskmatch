{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "deskmatch.serviceLabels" (merge (dict "component" "redis") .) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "deskmatch.serviceSelectorLabels" (merge (dict "component" "redis") .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "deskmatch.serviceSelectorLabels" (merge (dict "component" "redis") .) | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          ports:
            - containerPort: 6379
          args:
            - "--appendonly"
            - "yes"
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
{{- end }}